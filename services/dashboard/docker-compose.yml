# Standalone compose for the Provider Box dashboard. Run manually - this is
# deliberately NOT wired into bootstrap/provider-box.sh or --all (see README,
# "Phase 2"). Variables are interpolated from the shared config file:
#
#   docker compose --env-file ../../config/provider-box.env up -d --build
#
# See services/dashboard/README.md for the tokens and cert this needs.
services:
  dashboard:
    image: ${DASHBOARD_IMAGE}
    build: .
    restart: unless-stopped
    user: "1000:1000"
    # Read-only access to the host Docker socket needs the host docker group.
    group_add:
      - "${DASHBOARD_DOCKER_GID}"
    # host networking so the 127.0.0.1 pins reach the host-published NetBox and
    # Technitium ports, matching the dns-sync module's single-node design.
    network_mode: host
    extra_hosts:
      - "${DASHBOARD_NETBOX_HOST}:127.0.0.1"
      - "${DASHBOARD_TECHNITIUM_HOST}:127.0.0.1"
    environment:
      DASHBOARD_ADDR: "${DASHBOARD_ADDR}"
      DASHBOARD_FQDN: "${DASHBOARD_FQDN}"
      DASHBOARD_TLS_CERT: "/etc/dashboard/certs/dashboard.crt"
      DASHBOARD_TLS_KEY: "/etc/dashboard/certs/dashboard.key"
      # Certificates panel: step-ca DB is mounted read-only and snapshotted into
      # the writable tmpfs below; the live DB is never opened directly.
      DASHBOARD_STEPCA_DB: "/home/step/db"
      DASHBOARD_STEPCA_SNAPSHOT_DIR: "/snapshots"
      DASHBOARD_CERT_WARN_DAYS: "${DASHBOARD_CERT_WARN_DAYS}"
      # DNS panel (Technitium), read-only scoped token.
      DASHBOARD_TECHNITIUM_URL: "${DASHBOARD_TECHNITIUM_URL}"
      DASHBOARD_TECHNITIUM_TOKEN_FILE: "/run/dashboard/secrets/technitium.token"
      DASHBOARD_TECHNITIUM_CA_BUNDLE: "/etc/dashboard/root_ca.crt"
      # IPAM panel (NetBox), dedicated minimum-read-scope token (NOT dns-sync's).
      DASHBOARD_NETBOX_URL: "${DASHBOARD_NETBOX_URL}"
      DASHBOARD_NETBOX_TOKEN_FILE: "/run/dashboard/secrets/netbox-readonly.token"
      DASHBOARD_NETBOX_CA_BUNDLE: "/etc/dashboard/root_ca.crt"
      # Services + recent-errors panels (Docker socket, read-only).
      DASHBOARD_DOCKER_HOST: "unix:///var/run/docker.sock"
      DASHBOARD_CONTAINER_FILTERS: "${DASHBOARD_CONTAINER_FILTERS}"
      DASHBOARD_LOG_TAIL: "${DASHBOARD_LOG_TAIL}"
      DASHBOARD_UPSTREAM_TIMEOUT: "${DASHBOARD_UPSTREAM_TIMEOUT}"
    tmpfs:
      - /snapshots
    volumes:
      - ${CA_DATA_DIR:?CA_DATA_DIR must be set (empty would create a blank bind-mount source)}/db:/home/step/db:ro
      - ${CA_DATA_DIR:?CA_DATA_DIR must be set (empty would create a blank bind-mount source)}/certs/root_ca.crt:/etc/dashboard/root_ca.crt:ro
      - ${DASHBOARD_CERT_DIR:?DASHBOARD_CERT_DIR must be set (empty would create a blank bind-mount source)}:/etc/dashboard/certs:ro
      - ${DASHBOARD_SECRETS_DIR:?DASHBOARD_SECRETS_DIR must be set (empty would create a blank bind-mount source)}:/run/dashboard/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
