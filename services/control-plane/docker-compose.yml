# Standalone compose for the Provider Box control plane (read-only dashboard). Run manually - this is
# deliberately NOT wired into bootstrap/provider-box.sh or --all (see README,
# "Phase 2"). Variables are interpolated from the shared config file:
#
#   docker compose --env-file ../../config/provider-box.env up -d --build
#
# See services/control-plane/README.md for the tokens and cert this needs.
services:
  control-plane:
    image: ${CONTROL_PLANE_IMAGE}
    build: .
    restart: unless-stopped
    user: "1000:1000"
    # Read-only access to the host Docker socket needs the host docker group.
    group_add:
      - "${CONTROL_PLANE_DOCKER_GID}"
    # host networking so the 127.0.0.1 pins reach the host-published NetBox and
    # Technitium ports, matching the dns-sync module's single-node design.
    network_mode: host
    extra_hosts:
      - "${CONTROL_PLANE_NETBOX_HOST}:127.0.0.1"
      - "${CONTROL_PLANE_TECHNITIUM_HOST}:127.0.0.1"
    environment:
      CONTROL_PLANE_ADDR: "${CONTROL_PLANE_ADDR}"
      CONTROL_PLANE_FQDN: "${CONTROL_PLANE_FQDN}"
      CONTROL_PLANE_TLS_CERT: "/etc/control-plane/certs/control-plane.crt"
      CONTROL_PLANE_TLS_KEY: "/etc/control-plane/certs/control-plane.key"
      # Certificates panel: read step-ca's dedicated postgres over the
      # loopback-published port with a SELECT-only role. The password is a
      # mounted file, not baked into the DSN. host networking (below) makes the
      # 127.0.0.1 pin reach the CA-published port, same pattern as NetBox above.
      CONTROL_PLANE_STEPCA_DSN: "postgresql://${CA_POSTGRES_RO_USER}@127.0.0.1:${CA_POSTGRES_PORT}/${CA_POSTGRES_DB}?sslmode=disable"
      CONTROL_PLANE_STEPCA_PG_PASSWORD_FILE: "/run/control-plane/secrets/stepca-ro.pgpassword"
      CONTROL_PLANE_CERT_WARN_DAYS: "${CONTROL_PLANE_CERT_WARN_DAYS}"
      # DNS panel (Technitium), read-only scoped token.
      CONTROL_PLANE_TECHNITIUM_URL: "${CONTROL_PLANE_TECHNITIUM_URL}"
      CONTROL_PLANE_TECHNITIUM_TOKEN_FILE: "/run/control-plane/secrets/technitium.token"
      CONTROL_PLANE_TECHNITIUM_CA_BUNDLE: "/etc/control-plane/root_ca.crt"
      # IPAM panel (NetBox), dedicated minimum-read-scope token (NOT dns-sync's).
      CONTROL_PLANE_NETBOX_URL: "${CONTROL_PLANE_NETBOX_URL}"
      CONTROL_PLANE_NETBOX_TOKEN_FILE: "/run/control-plane/secrets/netbox-readonly.token"
      CONTROL_PLANE_NETBOX_CA_BUNDLE: "/etc/control-plane/root_ca.crt"
      # Services + recent-errors panels (Docker socket, read-only).
      CONTROL_PLANE_DOCKER_HOST: "unix:///var/run/docker.sock"
      CONTROL_PLANE_CONTAINER_FILTERS: "${CONTROL_PLANE_CONTAINER_FILTERS}"
      CONTROL_PLANE_LOG_TAIL: "${CONTROL_PLANE_LOG_TAIL}"
      CONTROL_PLANE_UPSTREAM_TIMEOUT: "${CONTROL_PLANE_UPSTREAM_TIMEOUT}"
    volumes:
      - ${CA_DATA_DIR:?CA_DATA_DIR must be set (empty would create a blank bind-mount source)}/certs/root_ca.crt:/etc/control-plane/root_ca.crt:ro
      - ${CONTROL_PLANE_CERT_DIR:?CONTROL_PLANE_CERT_DIR must be set (empty would create a blank bind-mount source)}:/etc/control-plane/certs:ro
      - ${CONTROL_PLANE_SECRETS_DIR:?CONTROL_PLANE_SECRETS_DIR must be set (empty would create a blank bind-mount source)}:/run/control-plane/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
